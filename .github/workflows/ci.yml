name: Django CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-django pytest-cov flake8 six

      - name: Vérifier le style avec flake8
        run: |
          flake8 . --exclude=env,__pycache__,.git

      - name: Lancer les tests
        run: |
          pytest -v

      - name: Vérifier la couverture
        run: |
          pytest --cov=. --cov-config=.coveragerc --cov-report=term-missing

      - name: Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Construire et publier l'image Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: bastienm06/oc-lettings:latest

      - name: Redéployer sur Render
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
