name: Django CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-django pytest-cov flake8

      - name: Vérifier le style avec flake8
        run: |
          flake8 . --exclude=env,__pycache__,.git

      - name: Lancer les tests
        run: |
          pytest -v

      - name: Vérifier la couverture
        run: |
          pytest --cov=. --cov-config=.coveragerc --cov-report=term-missing
